server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/pgms
    username: postgres
    password: Chinni@321
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
